{% set name = "getfem" %}
{% set version = "5.4.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/{{ name }}/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d552106065afa15146efb5eb179cf0c69b17b170ce153444599d5cccf618f17c

build:
  number: 0
  skip: true  # [py>=311 or (python_impl == 'pypy')]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}  # [not win]
    - {{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - python
    - setuptools
    - numpy
    - scipy
    - qhull
    - mumps-seq
    - openblas
  run:
    - numpy
    - scipy
    - qhull
    - mumps-seq
    - libopenblas
    - python

test:
  imports:
    - getfem
  commands:
    # 1. Verify standard Python module execution
    - |
      python -c "import getfem; print(f'GetFEM imported successfully from: {getfem.__file__}')"
    
    # 2. Cross the C++ boundary by instantiating a core GetFEM object.
    # This physically forces the OS to load _getfem.pyd and all its linked DLLs (MUMPS, OpenBLAS, etc.)
    - |
      python -c "import getfem; m = getfem.Mesh('empty', 2); print('GetFEM C++ extension loaded and executed successfully.')"

about:
  home: https://getfem.org/
  license: LGPL-3.0-or-later AND BSD-3-Clause
  license_family: LGPL
  license_file: 
    - COPYING
    - dep-licenses/
  summary: 'GetFEM++ is a generic finite element C++ library with interfaces for Python, Matlab and Scilab.'
  description: |
    The GetFEM project focuses on the development of a generic and efficient C++ library for finite element methods elementary computations.
  doc_url: https://getfem.readthedocs.io
  dev_url: https://github.com/getfem-doc/getfem

extra:
  recipe-maintainers:
    - logari81
    - yvesrenard
    - tkoyama010
    - daviddanan
    - ldallolio
